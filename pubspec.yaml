name: docuscan_pro
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase core
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.1.1

  # State management
  provider: ^6.1.2

  # Device features
  image_picker: ^1.1.2
  file_picker: ^8.0.7
  camera: ^0.11.0

  # PDF viewer
  syncfusion_flutter_pdfviewer: ^27.1.50

  # OCR (ML Kit)
  google_mlkit_text_recognition: ^0.14.0

  # Drawing / annotations
  signature: ^5.5.0

  # Payments
  flutter_stripe: ^11.0.0

  # Utils
  path_provider: ^2.1.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
